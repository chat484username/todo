<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deleted Deals</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=EB+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#F7F6F1;
  --card-bg:#FFFFFF;
  --ink:#2C2C2A;
  --ink-2:#5F5E5A;
  --mute:#8E8B82;
  --line:#E8E3D6;
  --line-2:#DDD8C9;
  --brown:#7A604A;
  --c-appraise:#3D6E92;
  --c-view:    #C48831;
  --c-offer:   #6F8F4C;
  --c-followup:#6D4B6B;
  --c-danger:  #C0392B;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--paper);min-height:100vh;color:var(--ink);font-size:14px}

header{background:#2A4A3E;color:#fff;padding:0 16px;min-height:52px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
header h1{font-family:'EB Garamond',Georgia,serif;font-weight:500;font-size:22px;letter-spacing:-0.01em;color:#fff;margin:0;flex-shrink:0}
header a.back{color:rgba(255,255,255,0.75);font-size:13px;text-decoration:none}
header a.back:hover{color:#fff}

.container{max-width:1400px;margin:24px auto 60px;padding:0 24px}

.page-intro{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.page-title{font-family:'EB Garamond',Georgia,serif;font-weight:500;font-size:24px;letter-spacing:-0.01em}
.page-count{font-family:'DM Mono',monospace;font-size:13px;color:var(--mute)}
.page-note{color:var(--mute);font-size:13px;margin-bottom:24px;line-height:1.5;max-width:640px}

.lane-cards{display:flex;gap:14px;overflow-x:auto;padding:6px 2px 14px;scrollbar-width:thin;flex-wrap:wrap}
.lane-cards::-webkit-scrollbar{height:8px}
.lane-cards::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:4px}
.lane-empty{color:var(--mute);font-size:13px;font-style:italic;padding:20px 4px}

.deal-card{
  flex:0 0 auto;
  width:172px;
  background:var(--card-bg);
  border:1px solid var(--line-2);
  border-radius:10px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  opacity:0.7;
  filter:saturate(0.5);
  transition:opacity 0.15s, filter 0.15s, border-color 0.15s;
}
.deal-card:hover{opacity:1;filter:none;border-color:var(--brown)}

.card-photo{
  width:100%;
  aspect-ratio:4/3;
  background:#F3F0EA;
  background-size:cover;
  background-position:center;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
}
.card-photo .placeholder{color:#C0B9A8;width:46px;height:46px}
.card-photo.has-photo .placeholder{display:none}

.card-body{padding:10px 11px 8px;display:flex;flex-direction:column;gap:6px;flex:1}
.card-name{
  font-family:'EB Garamond',Georgia,serif;
  font-weight:500;
  font-size:15px;
  line-height:1.2;
  color:var(--ink);
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
  min-height:36px;
}
.card-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--mute);letter-spacing:-0.2px}

/* Status chips — clicking these RESTORES to that status */
.card-status-row{display:flex;gap:3px;margin-top:4px}
.status-chip{
  flex:1;
  height:22px;
  border:1px solid var(--line-2);
  background:#F3F0EA;
  border-radius:4px;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  font-size:10px;
  font-weight:500;
  color:#A6A294;
  letter-spacing:0.02em;
  display:flex;align-items:center;justify-content:center;
  padding:0;
  transition:all 0.1s;
}
.status-chip.c-appraise:hover{border-color:var(--c-appraise);color:var(--c-appraise);background:color-mix(in srgb, var(--c-appraise) 7%, #F7F6F1)}
.status-chip.c-view:hover    {border-color:var(--c-view);color:var(--c-view);background:color-mix(in srgb, var(--c-view) 7%, #F7F6F1)}
.status-chip.c-offer:hover   {border-color:var(--c-offer);color:var(--c-offer);background:color-mix(in srgb, var(--c-offer) 7%, #F7F6F1)}
.status-chip.c-followup:hover{border-color:var(--c-followup);color:var(--c-followup);background:color-mix(in srgb, var(--c-followup) 7%, #F7F6F1)}

.card-footer{
  display:flex;
  border-top:1px solid var(--line);
  margin-top:4px;
}
.card-icon-btn{
  flex:1;
  background:transparent;
  border:none;
  padding:8px 0;
  cursor:pointer;
  color:var(--mute);
  font-family:inherit;
  font-size:11px;
  display:flex;align-items:center;justify-content:center;
  gap:4px;
  transition:background 0.1s, color 0.1s;
  border-right:1px solid var(--line);
}
.card-icon-btn:last-child{border-right:none}
.card-icon-btn:hover{background:#F3F0EA;color:var(--ink-2)}
.card-icon-btn.danger{color:var(--c-danger)}
.card-icon-btn.danger:hover{background:#FEF0F0;color:#a5311f}
.card-icon-btn svg{width:13px;height:13px}

.restore-hint{
  font-size:10px;
  color:var(--mute);
  text-align:center;
  padding:4px 0 2px;
  letter-spacing:0.04em;
}
</style>
</head>
<body>

<header>
  <h1>Deleted Deals</h1>
</header>

<div class="container">
  <div class="page-intro">
    <span class="page-title">🗑 Trash</span>
    <span class="page-count" id="trashCount">0</span>
    <a href="index.html" style="margin-left:auto;display:inline-block;background:#fff;color:#444;border:1px solid var(--line);padding:8px 16px;border-radius:4px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;text-decoration:none">← Back to pipeline</a>
  </div>
  <div class="page-note">
    Tap a status chip (<span style="color:var(--c-appraise);font-weight:500">Appr</span>,
    <span style="color:var(--c-view);font-weight:500">View</span>,
    <span style="color:var(--c-offer);font-weight:500">Offer</span>,
    <span style="color:var(--c-followup);font-weight:500">F/Up</span>)
    on a card to restore it directly into that lane. Or permanently delete — this removes the deal, its photo, and all data from your Gist forever.
  </div>

  <div class="lane-cards" id="deletedList"><div class="lane-empty">No deleted deals</div></div>

  <div style="display:flex;justify-content:flex-end;margin-top:32px;padding-top:20px;border-top:1px solid var(--line)">
    <button id="permDeleteAllBtn" onclick="permDeleteAll()" style="background:#8B0000;color:#fff;border:none;padding:8px 16px;border-radius:4px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;letter-spacing:0.02em;cursor:pointer;display:none">Permanently delete all</button>
  </div>

  <div style="text-align:center;margin-top:20px"><span id="syncStatus" style="font-size:11px;color:var(--mute)"></span></div>
</div>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="icon-building" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 42 V14 L24 6 L40 14 V42"/>
      <path d="M8 42 H40"/>
      <rect x="14" y="20" width="5" height="6" rx="0.5"/>
      <rect x="21.5" y="20" width="5" height="6" rx="0.5"/>
      <rect x="29" y="20" width="5" height="6" rx="0.5"/>
      <rect x="14" y="30" width="5" height="6" rx="0.5"/>
      <rect x="29" y="30" width="5" height="6" rx="0.5"/>
      <rect x="21.5" y="30" width="5" height="12" rx="0.5"/>
    </g>
  </symbol>
</svg>

<script>
var ANALYSER_PAGE = 'todo-v6.html';
var GIST_ID = localStorage.getItem('todoGistId') || 'acb18997fb5494fd10b3696c038a0fd7';
var dealsIndex = {};
var photoCache = {};
var gistFilesMeta = null;

function getToken(){ return localStorage.getItem('todoToken') || ''; }

function setStatus(msg, ok){
  var el = document.getElementById('syncStatus');
  if(!el) return;
  el.textContent = msg;
  el.style.color = ok === false ? '#C0392B' : ok === true ? '#5F8047' : 'var(--mute)';
}

async function saveIndex(){
  var token = getToken();
  if(!token) return;
  var body = { files: { 'deals-index.json': { content: JSON.stringify(dealsIndex, null, 2) } } };
  await fetch('https://api.github.com/gists/' + GIST_ID, {
    method: 'PATCH',
    headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}

async function loadDeals(){
  var token = getToken();
  if(!token || !GIST_ID){ setStatus('No token or Gist', false); return; }
  setStatus('Loading\u2026');
  try {
    var res = await fetch('https://api.github.com/gists/' + GIST_ID, { headers: { Authorization: 'token ' + token } });
    if(!res.ok){ setStatus('Error: ' + res.status, false); return; }
    var data = await res.json();
    gistFilesMeta = data.files || {};
    if(gistFilesMeta['deals-index.json']){
      var f = gistFilesMeta['deals-index.json'];
      var raw = f.truncated ? await (await fetch(f.raw_url)).text() : f.content;
      dealsIndex = JSON.parse(raw || '{}');
    }
    renderDeals();
    setStatus('Loaded \u2713', true);
    loadPhotosLazy();
  } catch(e){ setStatus('Error: ' + e.message, false); }
}

async function loadPhotosLazy(){
  if(!gistFilesMeta) return;
  var ids = Object.keys(dealsIndex).filter(function(id){ return dealsIndex[id].deleted; });
  ids.forEach(function(id){
    var mirror = localStorage.getItem('mirror-photo-' + id);
    if(mirror){ photoCache[id] = mirror; applyPhotoToCard(id, mirror); }
  });
  for(var i = 0; i < ids.length; i++){
    var id = ids[i];
    if(photoCache[id]) continue;
    var f = gistFilesMeta['photo-' + id + '.txt'];
    if(!f) continue;
    try {
      var raw = f.content;
      if(!raw || f.truncated){
        var r = await fetch(f.raw_url);
        raw = await r.text();
      }
      if(raw && raw.trim()){
        photoCache[id] = raw.trim();
        applyPhotoToCard(id, raw.trim());
      }
    } catch(e){}
  }
}

function applyPhotoToCard(id, dataUrl){
  var cards = document.querySelectorAll('[data-id="' + id + '"] .card-photo');
  cards.forEach(function(c){
    c.style.backgroundImage = 'url("' + dataUrl + '")';
    c.classList.add('has-photo');
  });
}

var STATUSES = ['appraise','view','offer','followup'];
var STATUS_SHORT = {appraise:'Appr',view:'View',offer:'Offer',followup:'F/Up'};
var STATUS_LABELS = {appraise:'Restore to Appraise',view:'Restore to View',offer:'Restore to Offer',followup:'Restore to Follow Up'};
var STATUS_CLASS = {appraise:'c-appraise',view:'c-view',offer:'c-offer',followup:'c-followup'};

function renderDeals(){
  var ids = Object.keys(dealsIndex).filter(function(id){ return dealsIndex[id].deleted; });
  ids.sort(function(a,b){ return new Date(dealsIndex[b].updated || 0) - new Date(dealsIndex[a].updated || 0); });

  var el = document.getElementById('deletedList');
  document.getElementById('trashCount').textContent = ids.length;
  var pdBtn = document.getElementById('permDeleteAllBtn');
  if(pdBtn) pdBtn.style.display = ids.length > 0 ? 'inline-block' : 'none';

  if(!ids.length){
    el.innerHTML = '<div class="lane-empty">No deleted deals</div>';
    return;
  }
  el.innerHTML = ids.map(cardHTML).join('');
  ids.forEach(function(id){
    if(photoCache[id]) applyPhotoToCard(id, photoCache[id]);
  });
}

function cardHTML(id){
  var d = dealsIndex[id];
  var date = d.updated ? new Date(d.updated).toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '';
  var name = (d.name || id).replace(/[<>&]/g, function(c){ return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c]; });

  var statusRow = '<div class="restore-hint">Restore into —</div>' +
    '<div class="card-status-row">' +
    STATUSES.map(function(s){
      return '<button class="status-chip ' + STATUS_CLASS[s] + '" title="' + STATUS_LABELS[s] + '" onclick="restoreDeal(this,\'' + s + '\')">' + STATUS_SHORT[s] + '</button>';
    }).join('') +
    '</div>';

  var footer = '<div class="card-footer">' +
    '<button class="card-icon-btn danger" onclick="permDeleteDeal(this)" title="Permanently delete — cannot be undone">' +
      iconSvg('trash') + ' Delete forever' +
    '</button>' +
  '</div>';

  return '<div class="deal-card" data-id="' + id + '">' +
    '<div class="card-photo"><svg class="placeholder" viewBox="0 0 48 48"><use href="#icon-building"/></svg></div>' +
    '<div class="card-body">' +
      '<div class="card-name" title="' + name + '">' + name + '</div>' +
      (date ? '<div class="card-meta">Deleted ' + date + '</div>' : '') +
      statusRow +
    '</div>' +
    footer +
  '</div>';
}

function iconSvg(kind){
  var defs = {
    trash: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 6 h10 v10 a1 1 0 0 1 -1 1 h-8 a1 1 0 0 1 -1 -1 z"/><path d="M3 6 h14"/><path d="M8 4 h4 v2"/><path d="M9 9 v5 M11 9 v5"/></svg>'
  };
  return defs[kind] || '';
}

function getId(btn){ return btn.closest('.deal-card').dataset.id; }

// ───── FLIP animation helpers ─────
function captureRects(){
  var rects = {};
  document.querySelectorAll('.deal-card').forEach(function(el){
    var id = el.dataset.id;
    if(!id) return;
    rects[id] = el.getBoundingClientRect();
  });
  return rects;
}
function prepareRemovalGhost(id){
  var el = document.querySelector('[data-id="' + id + '"]');
  if(!el) return null;
  return { clone: el.cloneNode(true), rect: el.getBoundingClientRect() };
}
function animateFlip(oldRects, opts){
  opts = opts || {};
  var removedGhosts = opts.removedGhosts || [];
  var DURATION_MOVE = 380, DURATION_FADE = 280;
  var EASE = 'cubic-bezier(0.2, 0.8, 0.2, 1)';

  document.querySelectorAll('.deal-card').forEach(function(el){
    var id = el.dataset.id;
    if(!id || !oldRects[id]) return;
    var oldRect = oldRects[id];
    var newRect = el.getBoundingClientRect();
    var dx = oldRect.left - newRect.left;
    var dy = oldRect.top - newRect.top;
    if(Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
    el.style.transition = 'none';
    el.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        el.style.transition = 'transform ' + DURATION_MOVE + 'ms ' + EASE;
        el.style.transform = '';
        setTimeout(function(){ el.style.transition = ''; }, DURATION_MOVE + 50);
      });
    });
  });

  removedGhosts.forEach(function(ghost){
    var g = ghost.clone;
    g.style.position = 'fixed';
    g.style.left = ghost.rect.left + 'px';
    g.style.top = ghost.rect.top + 'px';
    g.style.width = ghost.rect.width + 'px';
    g.style.height = ghost.rect.height + 'px';
    g.style.margin = '0';
    g.style.pointerEvents = 'none';
    g.style.zIndex = '1000';
    g.style.transition = 'none';
    g.style.transformOrigin = 'center center';
    document.body.appendChild(g);
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        g.style.transition = 'opacity ' + DURATION_FADE + 'ms ease-out, transform ' + DURATION_FADE + 'ms ' + EASE;
        g.style.opacity = '0';
        g.style.transform = 'scale(0.85)';
        setTimeout(function(){ g.remove(); }, DURATION_FADE + 80);
      });
    });
  });
}

async function restoreDeal(btn, newStatus){
  var id = getId(btn);
  if(!dealsIndex[id]) return;
  var oldRects = captureRects();
  var ghost = prepareRemovalGhost(id);
  dealsIndex[id].deleted = false;
  dealsIndex[id].archived = false;
  dealsIndex[id].status = newStatus;
  dealsIndex[id].updated = new Date().toISOString();
  await saveIndex();
  renderDeals();
  animateFlip(oldRects, { removedGhosts: ghost ? [ghost] : [] });
  setStatus('Restored to ' + STATUS_SHORT[newStatus] + ' \u2713', true);
}

async function permDeleteDeal(btn){
  var id = getId(btn);
  var name = dealsIndex[id].name || id;
  if(!confirm('\u26a0\ufe0f PERMANENTLY DELETE "' + name + '"?\n\nThis will:\n\u2022 Remove it from your Gist forever\n\u2022 Delete all data including any photo\n\u2022 Cannot be undone\n\nAre you absolutely sure?')) return;
  var token = getToken();
  var oldRects = captureRects();
  var ghost = prepareRemovalGhost(id);
  // Snapshot so we can restore on failure
  var savedEntry = dealsIndex[id];
  delete dealsIndex[id];
  renderDeals();
  animateFlip(oldRects, { removedGhosts: ghost ? [ghost] : [] });

  if(!token || !GIST_ID){ setStatus('Locally removed \u2014 no token to sync', false); return; }

  // Ensure we have file metadata so we don't try to null non-existent files
  if(!gistFilesMeta){
    try {
      var metaRes = await fetch('https://api.github.com/gists/' + GIST_ID, { headers: { Authorization: 'token ' + token } });
      if(metaRes.ok){ var metaData = await metaRes.json(); gistFilesMeta = metaData.files || {}; }
    } catch(e){ gistFilesMeta = {}; }
  }

  var body = { files: {} };
  var files = gistFilesMeta || {};
  if(files['deal-' + id + '.json'])      body.files['deal-' + id + '.json']      = null;
  if(files['photo-' + id + '.txt'])      body.files['photo-' + id + '.txt']      = null;
  if(files['floorplan-' + id + '.txt'])  body.files['floorplan-' + id + '.txt']  = null;
  body.files['deals-index.json'] = { content: JSON.stringify(dealsIndex, null, 2) };

  setStatus('Deleting\u2026');
  try {
    var res = await fetch('https://api.github.com/gists/' + GIST_ID, {
      method: 'PATCH',
      headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if(!res.ok){
      // fetch() does NOT throw on 4xx/5xx — we have to check res.ok ourselves.
      var errText = '';
      try { errText = await res.text(); } catch(e){}
      throw new Error('GitHub ' + res.status + (errText ? ': ' + errText.slice(0, 120) : ''));
    }
    // Update file metadata cache so subsequent ops don't try to re-null these
    delete files['deal-' + id + '.json'];
    delete files['photo-' + id + '.txt'];
    delete files['floorplan-' + id + '.txt'];
    setStatus('Permanently deleted \u2713', true);
  } catch(e){
    // Restore in-memory state so the user sees that it did NOT actually delete
    dealsIndex[id] = savedEntry;
    renderDeals();
    setStatus('Delete failed \u2014 ' + e.message, false);
    alert('Permanent delete failed:\n\n' + e.message + '\n\nThe deal has been restored. Try again or check your token / gist permissions.');
  }
}

async function permDeleteAll(){
  // Collect ONLY deals marked as deleted. Belt-and-braces filter to ensure
  // we never touch live deals.
  var ids = Object.keys(dealsIndex).filter(function(id){
    return dealsIndex[id] && dealsIndex[id].deleted === true;
  });
  if(!ids.length) return;
  // Two-stage confirmation, with a red emphatic message
  var msg1 = '\u26a0\ufe0f \u26a0\ufe0f  PERMANENTLY DELETE ALL ' + ids.length + ' DEAL(S) IN TRASH?  \u26a0\ufe0f \u26a0\ufe0f\n\n'
    + 'This will:\n'
    + '\u2022 Remove every deal in this trash from your Gist forever\n'
    + '\u2022 Delete all data including photos and floorplans\n'
    + '\u2022 Cannot be undone\n\n'
    + 'Deals NOT in trash will not be affected.\n\n'
    + 'Are you absolutely sure?';
  if(!confirm(msg1)) return;
  var msg2 = 'FINAL CONFIRMATION:\n\nClick OK to permanently destroy ' + ids.length + ' deal(s).\nThis action is irreversible.';
  if(!confirm(msg2)) return;

  var token = getToken();
  if(!token || !GIST_ID){
    // Local-only delete
    ids.forEach(function(id){ delete dealsIndex[id]; });
    renderDeals();
    setStatus('Locally removed \u2014 no token to sync', false);
    return;
  }

  // Make sure we have file metadata so we don't try to null non-existent files
  if(!gistFilesMeta){
    try {
      var metaRes = await fetch('https://api.github.com/gists/' + GIST_ID, { headers: { Authorization: 'token ' + token } });
      if(metaRes.ok){ var metaData = await metaRes.json(); gistFilesMeta = metaData.files || {}; }
    } catch(e){ gistFilesMeta = {}; }
  }

  // Snapshot for restore-on-failure
  var savedEntries = {};
  ids.forEach(function(id){ savedEntries[id] = dealsIndex[id]; });

  // Optimistic in-memory delete
  var oldRects = captureRects();
  var ghosts = ids.map(function(id){ return prepareRemovalGhost(id); }).filter(Boolean);
  ids.forEach(function(id){ delete dealsIndex[id]; });
  renderDeals();
  animateFlip(oldRects, { removedGhosts: ghosts });

  // Build single PATCH that nulls every relevant file in one request
  var body = { files: {} };
  var files = gistFilesMeta || {};
  ids.forEach(function(id){
    if(files['deal-' + id + '.json'])     body.files['deal-' + id + '.json']     = null;
    if(files['photo-' + id + '.txt'])     body.files['photo-' + id + '.txt']     = null;
    if(files['floorplan-' + id + '.txt']) body.files['floorplan-' + id + '.txt'] = null;
  });
  body.files['deals-index.json'] = { content: JSON.stringify(dealsIndex, null, 2) };

  setStatus('Deleting ' + ids.length + ' deal(s)\u2026');
  try {
    var res = await fetch('https://api.github.com/gists/' + GIST_ID, {
      method: 'PATCH',
      headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if(!res.ok){
      var errText = '';
      try { errText = await res.text(); } catch(e){}
      throw new Error('GitHub ' + res.status + (errText ? ': ' + errText.slice(0, 120) : ''));
    }
    // Update file metadata cache so subsequent ops don't try to re-null these
    ids.forEach(function(id){
      delete files['deal-' + id + '.json'];
      delete files['photo-' + id + '.txt'];
      delete files['floorplan-' + id + '.txt'];
    });
    setStatus('Permanently deleted ' + ids.length + ' deal(s) \u2713', true);
  } catch(e){
    // Restore in-memory state so the user sees that the delete failed
    ids.forEach(function(id){ dealsIndex[id] = savedEntries[id]; });
    renderDeals();
    setStatus('Delete failed \u2014 ' + e.message, false);
    alert('Permanent delete failed:\n\n' + e.message + '\n\nThe deals have been restored. Try again or check your token / gist permissions.');
  }
}

(function(){ if(localStorage.getItem('todoToken')) loadDeals(); })();
</script>
