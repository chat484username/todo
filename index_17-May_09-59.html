  // For each destination visual slot d (0..N where N = visibleIndices.length):
  //   We need to pick a natural slot index.
  // The mapping is: in the destination final order, slot d holds whichever
  // card. Translating to natural slot positions, since natural slots are
  // already in geometric order, the d-th occupied natural slot is just the
  // d-th element of [0..length-1] (or [0..length] for cross-ctx).
  //
  // I.e. **natural slot at visual position d = d**. Always.
  //
  // Proof: natural slot k has Y position = first_top + k*pitch. Visual slot d
  // has Y position = first_top + d*pitch (cards are uniformly spaced). So
  // visual slot d sits at natural position d.

  // So each visible card with visual slot v maps to natural position v.
  visibleIndices.forEach(function(domIdx, v){
    var card = allTgt[domIdx];
    var nat  = allTgtRects[domIdx];
    var visualSlot = (v < targetIdx) ? v : v + 1;
    var targetTop  = naturalSlotYs[visualSlot];
    var targetLeft = naturalSlotXs[visualSlot];
    _applyTargetPos(card, nat, targetTop, targetLeft, tgtIsVert);
  });

  // Source (if same-context): stays at its natural slot, hidden
  if(sameCtx){
    for(var s = 0; s < allTgt.length; s++){
      if(allTgt[s].classList.contains('dnd-dragging')){
        var nat2 = allTgtRects[s];
        _applyTargetPos(allTgt[s], nat2, nat2.top, nat2.left, tgtIsVert);
        break;
      }
    }
  }

  // Clear stale transforms on other containers
  document.querySelectorAll('.list-cards, .v-list-cards').forEach(function(el){
    if(el === srcEl || el === tgtEl) return;
    el.querySelectorAll('.item-card').forEach(function(card){
      if(card.style.transform) card.style.transform = '';
    });
  });
}

function _clearLiveLayout(){
  _destroyGhost();
  document.querySelectorAll('.item-card').forEach(function(card){
    if(card.style.transform){
      card.style.transition = 'transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1)';
      card.style.transform = '';
      setTimeout(function(){ card.style.transition = ''; }, 200);
    }
  });
  _lastLayoutKey = null;
}

// Bar functions kept as no-ops (we don't show a bar)
function _hideBar(){}
function _showBar(){}
function _ensureDnDBar(){ return null; }
function _showBarForTarget(){}

// Cursor → insertion index. Uses the natural midpoints (untransformed) of
// visible cards in the container so the index is stable as cards animate.
function _computeInsertIndex(el, clientX, clientY, dragId){
  var items = _visibleCardsWithRects(el);
  if(!items.length) return 0;
  return _insertIndexAt(el, items, clientX, clientY);
}

function _updateIndicator(el, ctx, clientX, clientY){
  var idx = _computeInsertIndex(el, clientX, clientY, _dnd.id);
  _dnd.targetCtx = ctx;
  _dnd.targetIndex = idx;
  if(ctx.context === 'archived'){
    _hideBar();
    // Still want the ghost roughly in the archived strip
    if(!_dnd.ghost) _createGhost();
    return;
  }
  _updateLiveLayout();
}

// ── Drop ──
async function _dndPerformDrop(){
  var dragId = _dnd.id;
  var srcCtx = _dnd.sourceCtx;
  var dstCtx = _dnd.targetCtx;
  var dstIdx = _dnd.targetIndex;
  _hideBar();
  _destroyDragPreview();
  _dnd.id = null;
  if(!dragId || !dstCtx) return;
  var d = itemsIndex[dragId];
  if(!d) return;

  // Strip live-shift transforms cleanly with no transition so the cards don't
  // animate back from their shifted positions. Then drop the ghost — the
  // ghost itself gave the user the "where it'll land" signal, so we don't
  // need a FLIP animation on top.
  document.querySelectorAll('.item-card').forEach(function(card){
    if(card.style.transform || card.style.transition){
      card.style.transition = 'none';
      card.style.transform = '';
    }
  });
  _destroyGhost();

  // Archive
  if(dstCtx.context === 'archived'){
    d.archived = true;
    d.status = null;
    d.updated = new Date().toISOString();
    saveIndex();
    renderItems();
    return;
  }

  // Data-model updates
  if(dstCtx.context === 'schedule'){
    if(dstCtx.schedule === INBOX_KEY){
      d.status = INBOX_KEY;
      d.list = null;
    } else {
      if(srcCtx.context === 'list'){
        d.list = srcCtx.list;
        d.status = dstCtx.schedule;
      } else if(srcCtx.context === 'schedule' && srcCtx.schedule === INBOX_KEY){
        setStatus('Drag Inbox cards into a list first to give them a home', false);
        renderItems();
        return;
      } else {
        d.status = dstCtx.schedule;
      }
    }
  }
  if(dstCtx.context === 'list'){
    if(srcCtx.context === 'schedule' && srcCtx.schedule !== INBOX_KEY){
      d.list = dstCtx.list;
      d.status = null;
    } else if(srcCtx.context === 'schedule' && srcCtx.schedule === INBOX_KEY){
      d.list = dstCtx.list;
      d.status = null;
    } else if(srcCtx.context === 'list'){
      d.list = dstCtx.list;
      d.status = null;
    } else if(srcCtx.context === 'archived'){
      d.archived = false;
      d.list = dstCtx.list;
      d.status = null;
    }
  }
  d.updated = new Date().toISOString();

  if(dstCtx.context === 'schedule'){
    _placeAtIndex(dragId, function(otherId, od){
      return od.status === dstCtx.schedule && (dstCtx.schedule === INBOX_KEY ? !od.list : true);
    }, dstIdx == null ? 0 : dstIdx, dstCtx);
  } else if(dstCtx.context === 'list'){
    _placeAtIndex(dragId, function(otherId, od){
      return od.list === dstCtx.list;
    }, dstIdx == null ? 0 : dstIdx, dstCtx);
  }

  saveIndex();
  renderItems();
}

// ── Drag orchestration: mousedown / mousemove / mouseup ──
//
// We don't use HTML5 native drag-and-drop. Instead a global mousedown captures
// the potential start of a drag. On mousemove past the threshold, the drag
// begins (ghost outline + body class for cursor). Mouseup performs the drop.
// This gives us full cursor control (clenched fist persists), which the HTML5
// drag API doesn't allow CSS to override.

var DRAG_THRESHOLD_PX_DND = 4;

function _isDragMouseDownIgnored(target){
  // Don't initiate a drag from clicks on interactive children
  return !!(target.closest && target.closest('button, a, input, textarea, [contenteditable="plaintext-only"]'));
}

document.addEventListener('mousedown', function(e){
  if(e.button !== 0) return;
  if(_isDragMouseDownIgnored(e.target)) return;
  var card = e.target.closest('.item-card');
  if(!card) return;
  _dnd.id = null;       // not yet — drag only begins after threshold
  _dnd.card = card;
  _dnd.candidateId = card.dataset.id;
  _dnd.candidateSrcCtx = _ctxFromCard(card);
  _dnd.startX = e.clientX;
  _dnd.startY = e.clientY;
  _dnd.pending = true;
  _dnd.active = false;
});

document.addEventListener('mousemove', function(e){
  if(!_dnd.pending) return;
  if(!_dnd.active){
    var dx = Math.abs(e.clientX - _dnd.startX);
    var dy = Math.abs(e.clientY - _dnd.startY);
    if(dx < DRAG_THRESHOLD_PX_DND && dy < DRAG_THRESHOLD_PX_DND) return;
    _beginDrag();
  }
  _moveDragPreview(e.clientX, e.clientY);
  // For hit-testing, use the centre of the drag preview rather than the raw
  // cursor position. The preview hangs off the cursor at the original grab
  // offset; users intuitively expect the dropped card to land where they see
  // the preview, not where the cursor pixel is.
  var rect = _dnd.preview ? _dnd.preview.getBoundingClientRect() : null;
  var hitX = rect ? (rect.left + rect.width/2)  : e.clientX;
  var hitY = rect ? (rect.top  + rect.height/2) : e.clientY;
  _updateDragOver(hitX, hitY);
});

document.addEventListener('mouseup', function(e){
  if(!_dnd.pending) return;
  var wasActive = _dnd.active;
  _dnd.pending = false;
  if(wasActive){
    _dndPerformDrop();
  }
  _resetDndState();
});

function _beginDrag(){
  _dnd.active = true;
  _dnd.id = _dnd.candidateId;
  _dnd.sourceCtx = _dnd.candidateSrcCtx;
  _dnd.targetCtx = null;
  _dnd.targetIndex = null;
  // Exit any in-flight title state so a drag from a primed/editing title still works cleanly
  if(_activeName) _commitName(_activeName, true);
  if(_primedName) _exitPrimed(_primedName);
  document.body.classList.add('dnd-active');
  if(_dnd.card){
    _dnd.card.classList.add('dnd-dragging');
  }
  _createDragPreview();
  _createGhost();
}

// Drag preview — a translucent clone of the card that follows the cursor.
// Replaces what HTML5 native drag-and-drop gives you for free.
function _createDragPreview(){
  if(_dnd.preview || !_dnd.card) return;
  var rect = _dnd.card.getBoundingClientRect();
  // Remember the cursor's offset from the card's top-left at mousedown, so the
  // preview hovers at the same relative spot under the cursor while dragging.
  _dnd.previewOffsetX = _dnd.startX - rect.left;
  _dnd.previewOffsetY = _dnd.startY - rect.top;
  var clone = _dnd.card.cloneNode(true);
  clone.classList.add('dnd-preview');
  clone.style.position = 'fixed';
  clone.style.left = rect.left + 'px';
  clone.style.top  = rect.top  + 'px';
  clone.style.width  = rect.width  + 'px';
  clone.style.height = rect.height + 'px';
  clone.style.margin = '0';
  clone.style.pointerEvents = 'none';
  clone.style.zIndex = '200';
  clone.style.opacity = '0.88';
  clone.style.boxShadow = '0 10px 30px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10)';
  clone.style.outline = '2px dashed rgba(0,0,0,0.22)';
  clone.style.outlineOffset = '0px';
  clone.style.transition = 'none';
  // Strip the dragging class from the clone — it shouldn't be dimmed
  clone.classList.remove('dnd-dragging');
  document.body.appendChild(clone);
  _dnd.preview = clone;
}

function _moveDragPreview(clientX, clientY){
  if(!_dnd.preview) return;
  _dnd.preview.style.left = (clientX - _dnd.previewOffsetX) + 'px';
  _dnd.preview.style.top  = (clientY - _dnd.previewOffsetY) + 'px';
}

function _destroyDragPreview(){
  if(_dnd.preview){
    _dnd.preview.remove();
    _dnd.preview = null;
  }
}

function _updateDragOver(clientX, clientY){
  // Find which drop container the cursor is over. elementFromPoint won't return
  // the source card (it's visibility-hidden via _createGhost) or the ghost
  // (pointer-events:none on the ghost).
  var under = document.elementFromPoint(clientX, clientY);
  if(!under) return;
  var container = under.closest && under.closest('.list-cards, .v-list-cards');
  if(!container){
    // Cursor might be over a header; snap to that section's container
    var vl = under.closest && under.closest('.v-list');
    if(vl) container = vl.querySelector('.v-list-cards');
    else {
      var ln = under.closest && under.closest('.lane, .archived-section');
      if(ln) container = ln.querySelector('.list-cards');
    }
  }
  if(!container) return;
  var ctx = _ctxFromContainerEl(container);
  if(!ctx) return;
  if(ctx.context === 'archived'){
    _dnd.targetCtx = ctx;
    _dnd.targetIndex = null;
    if(_dnd.ghost){
      var r = container.getBoundingClientRect();
      _dnd.ghost.style.left = (r.left + 12) + 'px';
      _dnd.ghost.style.top  = (r.top  + 12) + 'px';
    }
    return;
  }
  var idx = _computeInsertIndex(container, clientX, clientY, _dnd.id);
  _dnd.targetCtx = ctx;
  _dnd.targetIndex = idx;
  _updateLiveLayout();
}

function _resetDndState(){
  // Cleanup after either successful drop or abandoned drag
  document.body.classList.remove('dnd-active');
  _destroyDragPreview();
  if(_dnd.card){
    _dnd.card.classList.remove('dnd-dragging');
    _dnd.card.style.visibility = '';
  }
  // If the drop didn't run a re-render (e.g. cancelled drag), clear ghost + shifts
  if(_dnd.ghost) _clearLiveLayout();
  _dnd.id = null;
  _dnd.card = null;
  _dnd.candidateId = null;
  _dnd.candidateSrcCtx = null;
  _dnd.sourceCtx = null;
  _dnd.targetCtx = null;
  _dnd.targetIndex = null;
  _dnd.active = false;
  _lastLayoutKey = null;
}

// Stub _wireDrag for compatibility — the system is now global, no per-card wiring needed
function _wireDrag(){}





(function(){
  var t = localStorage.getItem('todoToken');
  if(t) loadItems();
})();
</script>
